<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>أكليتو — الإشعارات</title>
<link rel="manifest" href="manifest-admin.json">
<meta name="theme-color" content="#130609">
<link rel="apple-touch-icon" href="icons/admin-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="لوحة أكليتو">
<meta name="mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin-style.css?v=6">
<style>
  /* ══════════ تبويبات (وارد / إرسال) — نفس لغة تبويبات شاشة الطلبات ══════════ */
  .notif-page { max-width: 900px; margin: 0 auto; width: 100%; min-width: 0; overflow-x: hidden; }
  .notif-tabs {
    display: flex; gap: 4px; margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    width: 100%; max-width: 100%; min-width: 0;
  }
  .notif-tab {
    flex-shrink: 0; display: flex; align-items: center; gap: 7px;
    padding: 10px 16px 12px; background: none; border: none;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 600;
    color: var(--cream30); cursor: pointer; white-space: nowrap; transition: color .15s, border-color .15s;
  }
  .notif-tab:hover { color: var(--cream); }
  .notif-tab.active { color: var(--cream); border-bottom-color: var(--red); }

  /* ══════════ عنصر تنبيه بالوارد ══════════ */
  .notif-item {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 14px 16px; border-radius: 14px; margin-bottom: 8px;
    background: var(--surface); border: 1px solid var(--border);
    cursor: pointer; transition: background .15s;
  }
  .notif-item:hover { background: var(--cream10); }
  .notif-item.unread { border-inline-start: 3px solid var(--red); }
  .notif-icon {
    width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
    background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 17px;
  }
  .notif-body { flex: 1; min-width: 0; }
  .notif-title { font-size: 13px; font-weight: 700; color: var(--cream); display: flex; align-items: center; gap: 6px; }
  .notif-msg { font-size: 12.5px; color: var(--cream60); margin-top: 3px; line-height: 1.5; }
  .notif-time { font-size: 11px; color: var(--cream30); margin-top: 5px; }
  .unread-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); box-shadow: 0 0 6px var(--red); flex-shrink: 0; }

  /* ══════════ سجل الإرسال ══════════ */
  .sent-item {
    padding: 12px 16px; border-radius: 12px; margin-bottom: 8px;
    background: var(--surface); border: 1px solid var(--border);
  }
  .sent-audience {
    display: inline-block; font-size: 10px; font-weight: 700; color: var(--orange);
    background: rgba(245,166,91,0.12); padding: 2px 9px; border-radius: 20px; margin-bottom: 6px;
  }
  .sent-title { font-size: 13px; font-weight: 700; color: var(--cream); }
  .sent-msg { font-size: 12.5px; color: var(--cream60); margin-top: 3px; line-height: 1.5; }
  .sent-time { font-size: 11px; color: var(--cream30); margin-top: 6px; }

  .section-label { font-size: 12px; font-weight: 700; color: var(--cream60); margin: 22px 0 10px; }
</style>
<script type="module">
import {
  db, auth, collection, getDocs, addDoc, doc, updateDoc, writeBatch,
  onSnapshot, query, orderBy, where, limit, serverTimestamp,
  onAuthStateChanged, signOut, withTimeout, watchUnreadNotifications
} from "./firebase-init.js";

let inboxCache = [];
let sentCache = [];
let customersCache = [];
let driversCache = [];
let storesCache = [];

const TYPE_META = {
  new_order:        { icon: '🛒', label: 'طلب جديد' },
  order_ready:      { icon: '📦', label: 'طلب جاهز' },
  order_claimed:    { icon: '🛵', label: 'استلمه سائق' },
  order_delivered:  { icon: '✅', label: 'تم التوصيل' },
  driver_issue:     { icon: '⚠️', label: 'مشكلة سائق' },
  default:          { icon: '🔔', label: 'تنبيه' },
};

function showToast(message, isError) {
  let toast = document.getElementById('akleto-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'akleto-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = message;
  toast.className = 'akleto-toast show' + (isError ? ' error' : '');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => { toast.className = 'akleto-toast'; }, 2500);
}

function timeAgo(ts) {
  if (!ts || !ts.toDate) return '—';
  const d = ts.toDate();
  const diffSec = Math.floor((Date.now() - d.getTime()) / 1000);
  if (diffSec < 60) return 'الآن';
  if (diffSec < 3600) return `منذ ${Math.floor(diffSec/60)} دقيقة`;
  if (diffSec < 86400) return `منذ ${Math.floor(diffSec/3600)} ساعة`;
  if (diffSec < 2592000) return `منذ ${Math.floor(diffSec/86400)} يوم`;
  return d.toLocaleDateString('ar-JO');
}

window.addEventListener('DOMContentLoaded', () => {

  onAuthStateChanged(auth, user => {
    if (!user) {
      window.location.href = 'akleto-admin.html';
    } else {
      document.getElementById('app-shell').style.display = 'flex';
      watchUnreadNotifications(count => {
        const badge = document.getElementById('notifNavBadge');
        if (badge) { badge.textContent = count; badge.classList.toggle('hidden', count === 0); }
      });
      listenInbox();
      listenSentLog();
      loadDirectory();
    }
  });

  window.adminLogout = () => signOut(auth);

  // ══════════ تبديل التبويبات ══════════
  window.switchTab = (tab) => {
    document.querySelectorAll('.notif-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.getElementById('tab-inbox').style.display = tab === 'inbox' ? 'block' : 'none';
    document.getElementById('tab-send').style.display = tab === 'send' ? 'block' : 'none';
  };

  // ══════════ الوارد ══════════
  function listenInbox() {
    const q = query(collection(db, 'admin_notifications'), orderBy('created_at', 'desc'), limit(100));
    onSnapshot(q, snap => {
      inboxCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderInbox();
    }, err => {
      console.error('inbox listen error', err);
      document.getElementById('inboxWrap').innerHTML = `<div class="empty-state" style="padding:30px 0;">صار خطأ بتحميل التنبيهات ❌</div>`;
    });
  }

  function renderInbox() {
    const wrap = document.getElementById('inboxWrap');
    const unreadCount = inboxCache.filter(n => !n.read).length;
    document.getElementById('inbox-count').textContent = unreadCount;
    document.getElementById('markAllBtn').style.display = unreadCount ? 'inline-flex' : 'none';

    if (!inboxCache.length) {
      wrap.innerHTML = `<div class="empty-state" style="padding:30px 0;">
        ولا تنبيه لسا 🔕<br/>
        <span style="font-size:12px;color:var(--cream30);">بتوصلك هون تلقائياً تنبيهات الطلبات الجديدة، الجاهزة، والموصّلة</span>
      </div>`;
      return;
    }
    wrap.innerHTML = inboxCache.map(n => {
      const meta = TYPE_META[n.type] || TYPE_META.default;
      return `
        <div class="notif-item ${n.read ? '' : 'unread'}" onclick="markAsRead('${n.id}')">
          <div class="notif-icon">${meta.icon}</div>
          <div class="notif-body">
            <div class="notif-title">${n.title || meta.label} ${n.read ? '' : '<span class="unread-dot"></span>'}</div>
            <div class="notif-msg">${n.message || ''}</div>
            <div class="notif-time">${timeAgo(n.created_at)}</div>
          </div>
        </div>`;
    }).join('');
  }

  window.markAsRead = async (id) => {
    const n = inboxCache.find(x => x.id === id);
    if (!n || n.read) return;
    try {
      await withTimeout(updateDoc(doc(db, 'admin_notifications', id), { read: true }), 15000, 'انتهت مهلة الحفظ');
    } catch (e) {
      console.error('markAsRead error', e);
      showToast('صار خطأ — جرب مرة ثانية ❌', true);
    }
  };

  window.markAllRead = async () => {
    const unread = inboxCache.filter(n => !n.read);
    if (!unread.length) return;
    try {
      const batch = writeBatch(db);
      unread.forEach(n => batch.update(doc(db, 'admin_notifications', n.id), { read: true }));
      await withTimeout(batch.commit(), 15000, 'انتهت مهلة الحفظ');
      showToast('تم تعليم الكل كمقروء ✅');
    } catch (e) {
      console.error('markAllRead error', e);
      showToast('صار خطأ — جرب مرة ثانية ❌', true);
    }
  };

  // ══════════ جمهور الإرسال ══════════
  async function loadDirectory() {
    try {
      const [custSnap, drvSnap, storeSnap] = await Promise.all([
        getDocs(collection(db, 'customers')),
        getDocs(collection(db, 'drivers')),
        getDocs(collection(db, 'stores')),
      ]);
      customersCache = custSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      driversCache = drvSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      storesCache = storeSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch (e) {
      console.error('loadDirectory error', e);
    }
  }

  window.onAudienceChange = () => {
    const val = document.getElementById('audienceSelect').value;
    const wrap = document.getElementById('targetWrap');
    const select = document.getElementById('targetSelect');
    if (val === 'customer') {
      wrap.style.display = 'block';
      select.innerHTML = customersCache.length
        ? customersCache.map(c => `<option value="${c.id}">${c.name || 'بدون اسم'} — ${c.phone || '—'}</option>`).join('')
        : `<option value="">ما في زبائن مسجّلين</option>`;
    } else if (val === 'driver') {
      wrap.style.display = 'block';
      select.innerHTML = driversCache.length
        ? driversCache.map(d => `<option value="${d.id}">${d.name || 'بدون اسم'} — ${d.phone || '—'}</option>`).join('')
        : `<option value="">ما في سائقين مسجّلين</option>`;
    } else if (val === 'store') {
      wrap.style.display = 'block';
      select.innerHTML = storesCache.length
        ? storesCache.map(s => `<option value="${s.id}">${s.name || 'بدون اسم'}</option>`).join('')
        : `<option value="">ما في متاجر مسجّلة</option>`;
    } else {
      wrap.style.display = 'none';
      select.innerHTML = '';
    }
  };

  // ══════════ إرسال ══════════
  window.sendNotification = async () => {
    const audience = document.getElementById('audienceSelect').value;
    const title = document.getElementById('notifTitle').value.trim();
    const message = document.getElementById('notifMessage').value.trim();
    const btn = document.getElementById('sendBtn');

    if (!title || !message) { showToast('لازم تعبي العنوان والنص ❌', true); return; }

    let targetId = null, targetName = null;
    if (audience === 'customer' || audience === 'driver' || audience === 'store') {
      targetId = document.getElementById('targetSelect').value;
      if (!targetId) { showToast('اختر المستلم أولاً ❌', true); return; }
      const list = audience === 'customer' ? customersCache : (audience === 'driver' ? driversCache : storesCache);
      const t = list.find(x => x.id === targetId);
      targetName = t ? t.name : null;
    }

    btn.disabled = true;
    btn.textContent = 'جاري الإرسال...';
    try {
      await withTimeout(addDoc(collection(db, 'user_notifications'), {
        audience, target_id: targetId, target_name: targetName,
        title, message, created_at: serverTimestamp(), sent_by: 'admin',
      }), 15000, 'انتهت مهلة الإرسال — تأكد من الإنترنت');

      document.getElementById('notifTitle').value = '';
      document.getElementById('notifMessage').value = '';
      showToast('تم إرسال الإشعار ✅');
    } catch (e) {
      console.error('sendNotification error', e);
      showToast('صار خطأ بالإرسال — جرب مرة ثانية ❌', true);
    } finally {
      btn.disabled = false;
      btn.textContent = '📤 إرسال الإشعار';
    }
  };

  // ══════════ سجل الإرسال ══════════
  function listenSentLog() {
    const q = query(collection(db, 'user_notifications'), orderBy('created_at', 'desc'), limit(30));
    onSnapshot(q, snap => {
      sentCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderSentLog();
    }, err => console.error('sent log listen error', err));
  }

  function audienceLabel(n) {
    if (n.audience === 'all_customers') return 'كل الزبائن';
    if (n.audience === 'all_drivers') return 'كل السائقين';
    if (n.audience === 'all_stores') return 'كل المتاجر';
    if (n.audience === 'customer') return `زبون: ${n.target_name || '—'}`;
    if (n.audience === 'driver') return `سائق: ${n.target_name || '—'}`;
    if (n.audience === 'store') return `متجر: ${n.target_name || '—'}`;
    return n.audience || '—';
  }

  function renderSentLog() {
    const wrap = document.getElementById('sentLogWrap');
    if (!sentCache.length) {
      wrap.innerHTML = `<div class="empty-state" style="padding:20px 0;">ما في رسائل مُرسلة لسا</div>`;
      return;
    }
    wrap.innerHTML = sentCache.map(n => `
      <div class="sent-item">
        <div class="sent-audience">${audienceLabel(n)}</div>
        <div class="sent-title">${n.title || ''}</div>
        <div class="sent-msg">${n.message || ''}</div>
        <div class="sent-time">${timeAgo(n.created_at)}</div>
      </div>`).join('');
  }

});
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</head>
<body>

<div id="app-shell" style="display:none;width:100%;">

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-text">أكليتو 🍽️</div>
    <div class="logo-sub">لوحة التحكم — ADMIN</div>
  </div>

  <div class="nav-section">
    <div class="nav-label">الرئيسية</div>
    <a class="nav-item" href="akleto-admin.html" style="text-decoration:none;color:inherit;">
      <span class="nav-icon">📊</span><span>نظرة عامة</span>
    </a>
    <a class="nav-item" href="akleto-admin-orders.html" style="text-decoration:none;color:inherit;"><span class="nav-icon">🛒</span><span>الطلبات</span></a>
    <a class="nav-item" href="akleto-admin-meals.html" style="text-decoration:none;color:inherit;">
      <span class="nav-icon">🍖</span><span>الوجبات</span>
    </a>
    <a class="nav-item" href="akleto-admin-ingredients.html" style="text-decoration:none;color:inherit;">
      <span class="nav-icon">🧅</span><span>المكونات</span>
    </a>
    <a class="nav-item" href="akleto-admin-units.html" style="text-decoration:none;color:inherit;">
      <span class="nav-icon">⚖️</span><span>الأوزان والمقاييس</span>
    </a>
  </div>

  <div class="nav-section">
    <div class="nav-label">المستخدمون</div>
    <a class="nav-item" href="akleto-admin-customers.html" style="text-decoration:none;color:inherit;">
      <span class="nav-icon">👤</span><span>الزبائن</span>
    </a>
    <a class="nav-item" href="akleto-admin-drivers.html" style="text-decoration:none;color:inherit;"><span class="nav-icon">🛵</span><span>السائقين</span></a>
    <a class="nav-item" href="akleto-admin-stores.html" style="text-decoration:none;color:inherit;"><span class="nav-icon">🏪</span><span>المتاجر الشريكة</span></a>
  </div>

  <div class="nav-section">
    <div class="nav-label">الإعدادات</div>
    <a class="nav-item active" href="akleto-admin-notifications.html" style="text-decoration:none;color:inherit;"><span class="nav-icon">📣</span><span>الإشعارات</span><span class="nav-badge hidden" id="notifNavBadge">0</span></a>
    <div class="nav-item"><span class="nav-icon">⚙️</span><span>الإعدادات</span></div>
  </div>

  <div class="sidebar-footer">
    <div class="admin-card">
      <div class="admin-avatar">م</div>
      <div>
        <div class="admin-name">مؤيد</div>
        <div class="admin-role">مدير المنصة 👑</div>
      </div>
      <button onclick="adminLogout()" title="خروج" style="margin-right:auto;background:none;border:none;color:var(--cream30);cursor:pointer;font-size:16px;">⏻</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div>
      <div class="page-title">📣 الإشعارات</div>
      <div class="page-subtitle"><span id="inbox-count">0</span> تنبيه غير مقروء</div>
    </div>
    <div class="topbar-actions">
      <button class="menu-toggle" id="menuBtn" onclick="toggleSidebar()" title="القائمة">☰</button>
      <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="تبديل الوضع">🌙</button>
    </div>
  </div>

  <div class="notif-page">
    <div class="notif-tabs">
      <button class="notif-tab active" data-tab="inbox" onclick="switchTab('inbox')">📥 الوارد</button>
      <button class="notif-tab" data-tab="send" onclick="switchTab('send')">📤 إرسال</button>
    </div>

    <!-- ══════ تبويب الوارد ══════ -->
    <div id="tab-inbox">
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
        <button id="markAllBtn" class="btn-secondary" style="display:none;" onclick="markAllRead()">✔️ تعليم الكل كمقروء</button>
      </div>
      <div id="inboxWrap"></div>
    </div>

    <!-- ══════ تبويب الإرسال ══════ -->
    <div id="tab-send" style="display:none;">
      <div class="card" style="padding:20px;">
        <div class="form-group">
          <label>الجمهور المستهدف</label>
          <select id="audienceSelect" onchange="onAudienceChange()">
            <option value="all_customers">كل الزبائن</option>
            <option value="all_drivers">كل السائقين</option>
            <option value="all_stores">كل المتاجر</option>
            <option value="customer">زبون محدد</option>
            <option value="driver">سائق محدد</option>
            <option value="store">متجر محدد</option>
          </select>
        </div>
        <div class="form-group" id="targetWrap" style="display:none;">
          <label>اختر المستلم</label>
          <select id="targetSelect"></select>
        </div>
        <div class="form-group">
          <label>عنوان الإشعار</label>
          <input type="text" id="notifTitle" placeholder="مثال: عرض خاص اليوم 🎉">
        </div>
        <div class="form-group">
          <label>نص الرسالة</label>
          <textarea id="notifMessage" rows="4" placeholder="اكتب نص الإشعار هون..."></textarea>
        </div>
        <button id="sendBtn" class="btn-primary" style="width:100%;justify-content:center;" onclick="sendNotification()">📤 إرسال الإشعار</button>
      </div>

      <div class="section-label">سجل الإرسال</div>
      <div id="sentLogWrap"></div>
    </div>
  </div>
</main>

</div>

<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => { if (window.innerWidth <= 860) closeSidebar(); });
    });
  });
  function toggleTheme() {
    const body = document.body;
    const btn  = document.getElementById('themeBtn');
    body.classList.toggle('light');
    btn.textContent = body.classList.contains('light') ? '🌙' : '☀️';
    localStorage.setItem('akleto-theme', body.classList.contains('light') ? 'light' : 'dark');
  }
  if (localStorage.getItem('akleto-theme') === 'light') {
    document.body.classList.add('light');
    document.addEventListener('DOMContentLoaded', () => { document.getElementById('themeBtn').textContent = '🌙'; });
  }
</script>
</body>
</html>
