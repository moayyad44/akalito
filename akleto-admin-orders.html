<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>أكليتو — الطلبات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin-style.css?v=3">
<script type="module">
import {
  db, auth, collection, getDocs, onSnapshot, query, orderBy, doc, updateDoc,
  onAuthStateChanged, signOut, withTimeout
} from "./firebase-init.js";

let mealsCache = {};      // meal_id -> name_ar
let ordersCache = [];     // كل الطلبات كما وصلت من Firestore
let currentFilter = 'all';
let currentOrderId = null;
let unsubOrders = null;

const STATUS = {
  pending:     { label: 'قيد المعالجة', emoji: '🟡', color: 'var(--orange)' },
  preparing:   { label: 'جاري التجهيز', emoji: '🔵', color: 'var(--blue)' },
  delivering:  { label: 'بالطريق',      emoji: '🚴', color: 'var(--blue)' },
  done:        { label: 'تم التوصيل',   emoji: '✅', color: 'var(--green)' },
  cancelled:   { label: 'ملغي',         emoji: '❌', color: 'var(--red)' }
};
const STATUS_ORDER = ['pending', 'preparing', 'delivering', 'done', 'cancelled'];
const NEXT_STATUS = { pending: 'preparing', preparing: 'delivering', delivering: 'done' };

function showToast(message, isError) {
  let toast = document.getElementById('akleto-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'akleto-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = message;
  toast.className = 'akleto-toast show' + (isError ? ' error' : '');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => { toast.className = 'akleto-toast'; }, 2500);
}

let _lockCount = 0;
function lockBodyScroll() {
  if (_lockCount === 0) { document.documentElement.classList.add('modal-lock'); document.body.classList.add('modal-lock'); }
  _lockCount++;
}
function unlockBodyScroll() {
  _lockCount = Math.max(0, _lockCount - 1);
  if (_lockCount === 0) { document.documentElement.classList.remove('modal-lock'); document.body.classList.remove('modal-lock'); }
}

function timeAgo(ts) {
  if (!ts || !ts.toDate) return '—';
  const diffMs = Date.now() - ts.toDate().getTime();
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'الآن';
  if (mins < 60) return `قبل ${mins} د`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `قبل ${hrs} س`;
  return `قبل ${Math.floor(hrs / 24)} يوم`;
}

window.addEventListener('DOMContentLoaded', () => {

  onAuthStateChanged(auth, user => {
    if (!user) {
      window.location.href = 'akleto-admin.html';
    } else {
      document.getElementById('app-shell').style.display = 'flex';
      loadMealsThenListen();
    }
  });

  window.adminLogout = () => signOut(auth);

  async function loadMealsThenListen() {
    try {
      const snap = await getDocs(collection(db, 'meals'));
      snap.docs.forEach(d => { mealsCache[d.id] = (d.data().name_ar || 'وجبة'); });
    } catch (e) { console.error('load meals error', e); }
    listenOrders();
  }

  function listenOrders() {
    const wrap = document.getElementById('ordersList');
    wrap.innerHTML = `<div class="ord-empty">جاري تحميل الطلبات...</div>`;
    try {
      const q = query(collection(db, 'orders'), orderBy('created_at', 'desc'));
      unsubOrders = onSnapshot(q, snap => {
        ordersCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        updateFilterCounts();
        renderOrders();
      }, err => {
        console.error('orders onSnapshot error', err);
        wrap.innerHTML = `<div class="ord-empty">صار خطأ بتحميل الطلبات — تحقق من الإنترنت</div>`;
      });
    } catch (e) {
      console.error('listen orders error', e);
      wrap.innerHTML = `<div class="ord-empty">صار خطأ بتحميل الطلبات</div>`;
    }
  }

  function updateFilterCounts() {
    document.getElementById('count-all').textContent = ordersCache.length;
    STATUS_ORDER.forEach(s => {
      const el = document.getElementById('count-' + s);
      if (el) el.textContent = ordersCache.filter(o => o.status === s).length;
    });
  }

  window.setOrderFilter = (f) => {
    currentFilter = f;
    document.querySelectorAll('.ord-chip').forEach(c => c.classList.toggle('active', c.dataset.filter === f));
    renderOrders();
  };

  function renderOrders() {
    const wrap = document.getElementById('ordersList');
    const list = currentFilter === 'all' ? ordersCache : ordersCache.filter(o => o.status === currentFilter);

    if (!list.length) {
      wrap.innerHTML = `<div class="ord-empty">ما في طلبات ${currentFilter === 'all' ? '' : 'بهاي الحالة'} حالياً</div>`;
      return;
    }

    wrap.innerHTML = list.map(o => {
      const st = STATUS[o.status] || STATUS.pending;
      const itemsCount = (o.items || []).length;
      return `
      <div class="ord-card" style="--st-color:${st.color}" onclick="openOrderSheet('${o.id}')">
        <div class="ord-card-row">
          <div class="ord-card-customer">${o.customer_name || 'زبون'}</div>
          <div class="ord-card-time">${timeAgo(o.created_at)}</div>
        </div>
        <div class="ord-card-badge">${st.emoji} ${st.label}</div>
        <div class="ord-card-meta">
          <span>📞 ${o.customer_phone || '—'}</span>
          <span>🍽️ ${itemsCount} وجبة</span>
          <span class="ord-card-price">${(o.total_estimated_price || 0).toFixed(2)} د.أ</span>
        </div>
      </div>`;
    }).join('');
  }

  // ══════ Bottom Sheet لتفاصيل الطلب ══════
  window.openOrderSheet = (orderId) => {
    const o = ordersCache.find(x => x.id === orderId);
    if (!o) return;
    currentOrderId = orderId;
    const st = STATUS[o.status] || STATUS.pending;

    document.getElementById('sheetCustomerName').textContent = o.customer_name || 'زبون';
    document.getElementById('sheetCustomerPhone').textContent = o.customer_phone || '—';
    document.getElementById('sheetStatusBadge').textContent = `${st.emoji} ${st.label}`;
    document.getElementById('sheetStatusBadge').style.color = st.color;
    document.getElementById('sheetTime').textContent = timeAgo(o.created_at);

    const mealsHtml = (o.items || []).map(it =>
      `<div class="sheet-meal-row">🍽️ ${mealsCache[it.meal_id] || 'وجبة'} <span class="sheet-meal-servings">× ${it.servings || 1}</span></div>`
    ).join('') || '<div class="ord-empty" style="padding:8px 0;">لا توجد عناصر</div>';
    document.getElementById('sheetMeals').innerHTML = mealsHtml;

    const ingHtml = (o.merged_ingredients || []).map(ing =>
      `<div class="sheet-ing-row"><span>${ing.name}</span><span class="sheet-ing-qty">${ing.quantity} ${ing.unit || ''}</span></div>`
    ).join('') || '<div class="ord-empty" style="padding:8px 0;">لا توجد مكونات</div>';
    document.getElementById('sheetIngredients').innerHTML = ingHtml;

    document.getElementById('sheetPrice').textContent = (o.total_estimated_price || 0).toFixed(2) + ' د.أ';

    // أزرار تغيير الحالة
    const actionsWrap = document.getElementById('sheetActions');
    actionsWrap.innerHTML = '';
    if (o.status !== 'done' && o.status !== 'cancelled') {
      if (NEXT_STATUS[o.status]) {
        const nextSt = STATUS[NEXT_STATUS[o.status]];
        const btn = document.createElement('button');
        btn.className = 'btn-primary';
        btn.style.width = '100%';
        btn.textContent = `➡️ نقل إلى: ${nextSt.emoji} ${nextSt.label}`;
        btn.onclick = () => changeOrderStatus(NEXT_STATUS[o.status]);
        actionsWrap.appendChild(btn);
      }
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'btn-secondary';
      cancelBtn.style.width = '100%';
      cancelBtn.style.marginTop = '8px';
      cancelBtn.textContent = '❌ إلغاء الطلب';
      cancelBtn.onclick = () => changeOrderStatus('cancelled');
      actionsWrap.appendChild(cancelBtn);
    }

    document.getElementById('sheetOverlay').classList.add('open');
    document.getElementById('orderSheet').classList.add('open');
    lockBodyScroll();
  };

  window.closeOrderSheet = () => {
    document.getElementById('sheetOverlay').classList.remove('open');
    document.getElementById('orderSheet').classList.remove('open');
    unlockBodyScroll();
    currentOrderId = null;
  };

  async function changeOrderStatus(newStatus) {
    if (!currentOrderId) return;
    try {
      await withTimeout(updateDoc(doc(db, 'orders', currentOrderId), { status: newStatus }), 10000, 'انتهت مهلة تحديث الحالة');
      showToast('✅ تم تحديث حالة الطلب');
      closeOrderSheet();
    } catch (e) {
      console.error('update status error', e);
      showToast('صار خطأ بتحديث الحالة', true);
    }
  }

  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => { if (window.innerWidth <= 860) closeSidebar(); });
  });
});
</script>
<style>
  /* ══════════ حاوية عامة تحدّ الاتساع على الشاشات الكبيرة ══════════ */
  .ord-page { max-width: 1100px; margin: 0 auto; width: 100%; }

  /* ══════════ فلاتر الحالة ══════════ */
  .ord-filters {
    display: flex; gap: 8px; overflow-x: auto; padding-bottom: 14px;
    -ms-overflow-style: none; scrollbar-width: none;
  }
  .ord-filters::-webkit-scrollbar { display: none; }
  .ord-chip {
    flex-shrink: 0; padding: 8px 16px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--cream60); font-family: 'Cairo', sans-serif; font-size: 13px;
    font-weight: 600; cursor: pointer; white-space: nowrap; transition: all .15s;
  }
  .ord-chip.active { background: var(--red); border-color: var(--red); color: #fff; }

  /* ══════════ قائمة البطاقات — عمود واحد افتراضياً (mobile-first) ══════════ */
  #ordersList { display: flex; flex-direction: column; gap: 10px; }

  .ord-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px 14px 14px;
    border-inline-start: 4px solid var(--st-color);
    cursor: pointer; transition: transform .12s, border-color .12s;
  }
  .ord-card:active { transform: scale(0.98); }

  .ord-card-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .ord-card-customer { font-weight: 700; font-size: 15px; color: var(--cream); }
  .ord-card-time { font-size: 12px; color: var(--cream30); flex-shrink: 0; }

  .ord-card-badge {
    display: inline-block; margin-top: 6px; font-size: 12px; font-weight: 600;
    color: var(--st-color);
  }

  .ord-card-meta {
    display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px;
    font-size: 12px; color: var(--cream60);
  }
  .ord-card-price { font-weight: 700; color: var(--cream); margin-inline-start: auto; }

  .ord-empty { padding: 40px 16px; text-align: center; color: var(--cream30); font-size: 13px; }

  /* ══════════ ديسكتوب: شبكة أعمدة بدل عمود واحد ══════════ */
  @media (min-width: 700px) {
    #ordersList { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); align-items: start; }
  }

  /* ══════════ Bottom Sheet لتفاصيل الطلب ══════════ */
  #sheetOverlay {
    display: none; position: fixed; top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.5); z-index: 500;
  }
  #sheetOverlay.open { display: block; }

  #orderSheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px 20px 0 0; z-index: 501;
    max-height: 88vh; display: flex; flex-direction: column;
    transform: translateY(100%); transition: transform .25s ease;
  }
  #orderSheet.open { transform: translateY(0); }

  .sheet-handle {
    width: 40px; height: 4px; background: var(--border); border-radius: 4px;
    margin: 10px auto 4px;
  }

  .sheet-header { padding: 8px 20px 14px; border-bottom: 1px solid var(--border); }
  .sheet-header-top { display: flex; justify-content: space-between; align-items: center; }
  .sheet-header-top h3 { font-family: 'Tajawal', sans-serif; font-size: 18px; }
  .sheet-close-btn { background: none; border: none; color: var(--cream30); font-size: 20px; cursor: pointer; }
  #sheetStatusBadge { font-size: 13px; font-weight: 700; margin-top: 4px; display: inline-block; }
  #sheetCustomerPhone, #sheetTime { font-size: 12px; color: var(--cream30); }

  .sheet-body { padding: 14px 20px 20px; overflow-y: auto; flex: 1; }
  .sheet-section-title { font-size: 12px; font-weight: 700; color: var(--cream30); margin: 14px 0 8px; }
  .sheet-section-title:first-child { margin-top: 0; }

  .sheet-meal-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; }
  .sheet-meal-servings { color: var(--cream30); }

  .sheet-ing-row {
    display: flex; justify-content: space-between; padding: 8px 0;
    border-bottom: 1px solid var(--cream10); font-size: 13px;
  }
  .sheet-ing-qty { color: var(--cream60); }

  .sheet-price-row {
    display: flex; justify-content: space-between; font-weight: 700;
    font-size: 15px; padding-top: 12px; margin-top: 8px; border-top: 1px solid var(--border);
  }

  .sheet-footer { padding: 14px 20px; border-top: 1px solid var(--border); }

  /* ديسكتوب: شكل بطاقة وسط الشاشة بدل ورقة منزلقة من الأسفل */
  @media (min-width: 640px) {
    #sheetOverlay { display: none; align-items: center; justify-content: center; }
    #sheetOverlay.open { display: flex; }
    #orderSheet {
      position: static; width: 100%; max-width: 480px;
      border-radius: 20px; transform: none; max-height: 85vh;
    }
  }
</style>
</head>
<body>

<div id="app-shell" style="display:none;width:100%;">

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-text">أكليتو 🍽️</div>
    <div class="logo-sub">لوحة التحكم — ADMIN</div>
  </div>

  <div class="nav-section">
    <div class="nav-label">الرئيسية</div>
    <a class="nav-item" href="akleto-admin.html" style="text-decoration:none;color:inherit;">
      <span class="nav-icon">📊</span><span>نظرة عامة</span>
    </a>
    <a class="nav-item active" href="akleto-admin-orders.html" style="text-decoration:none;color:inherit;"><span class="nav-icon">🛒</span><span>الطلبات</span></a>
    <a class="nav-item" href="akleto-admin-meals.html" style="text-decoration:none;color:inherit;">
      <span class="nav-icon">🍖</span><span>الوجبات</span>
    </a>
    <a class="nav-item" href="akleto-admin-ingredients.html" style="text-decoration:none;color:inherit;">
      <span class="nav-icon">🧅</span><span>المكونات</span>
    </a>
  </div>

  <div class="nav-section">
    <div class="nav-label">المستخدمون</div>
    <a class="nav-item" href="akleto-admin-customers.html" style="text-decoration:none;color:inherit;"><span class="nav-icon">👤</span><span>الزبائن</span></a>
    <div class="nav-item"><span class="nav-icon">🛵</span><span>السائقين</span></div>
    <div class="nav-item"><span class="nav-icon">🏪</span><span>المتاجر الشريكة</span></div>
  </div>

  <div class="nav-section">
    <div class="nav-label">الإعدادات</div>
    <div class="nav-item"><span class="nav-icon">📣</span><span>الإشعارات</span></div>
    <div class="nav-item"><span class="nav-icon">⚙️</span><span>الإعدادات</span></div>
  </div>

  <div class="sidebar-footer">
    <div class="admin-card">
      <div class="admin-avatar">م</div>
      <div>
        <div class="admin-name">مؤيد</div>
        <div class="admin-role">مدير المنصة 👑</div>
      </div>
      <button onclick="adminLogout()" title="خروج" style="margin-right:auto;background:none;border:none;color:var(--cream30);cursor:pointer;font-size:16px;">⏻</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="ord-page">
    <div class="topbar">
      <div>
        <div class="page-title">🛒 الطلبات</div>
        <div class="page-subtitle">تحديث لحظي — أي طلب جديد بيظهر تلقائياً</div>
      </div>
      <div class="topbar-actions">
        <button class="menu-toggle" id="menuBtn" onclick="toggleSidebar()" title="القائمة">☰</button>
        <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="تبديل الوضع">🌙</button>
      </div>
    </div>

    <div class="ord-filters">
      <button class="ord-chip active" data-filter="all" onclick="setOrderFilter('all')">الكل (<span id="count-all">0</span>)</button>
      <button class="ord-chip" data-filter="pending" onclick="setOrderFilter('pending')">🟡 قيد المعالجة (<span id="count-pending">0</span>)</button>
      <button class="ord-chip" data-filter="preparing" onclick="setOrderFilter('preparing')">🔵 جاري التجهيز (<span id="count-preparing">0</span>)</button>
      <button class="ord-chip" data-filter="delivering" onclick="setOrderFilter('delivering')">🚴 بالطريق (<span id="count-delivering">0</span>)</button>
      <button class="ord-chip" data-filter="done" onclick="setOrderFilter('done')">✅ تم التوصيل (<span id="count-done">0</span>)</button>
      <button class="ord-chip" data-filter="cancelled" onclick="setOrderFilter('cancelled')">❌ ملغي (<span id="count-cancelled">0</span>)</button>
    </div>

    <div id="ordersList"></div>
  </div>
</main>

</div>

<!-- ══════ Bottom Sheet: تفاصيل الطلب ══════ -->
<div id="sheetOverlay" onclick="if(event.target===this) closeOrderSheet()">
  <div id="orderSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-header-top">
        <div>
          <h3 id="sheetCustomerName">—</h3>
          <div id="sheetStatusBadge">—</div>
        </div>
        <button class="sheet-close-btn" onclick="closeOrderSheet()">✕</button>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;">
        <span id="sheetCustomerPhone">—</span>
        <span id="sheetTime">—</span>
      </div>
    </div>
    <div class="sheet-body">
      <div class="sheet-section-title">🍽️ الوجبات المطلوبة</div>
      <div id="sheetMeals"></div>

      <div class="sheet-section-title">🧅 المكونات المدموجة</div>
      <div id="sheetIngredients"></div>

      <div class="sheet-price-row">
        <span>الإجمالي التقديري</span>
        <span id="sheetPrice">—</span>
      </div>
    </div>
    <div class="sheet-footer" id="sheetActions"></div>
  </div>
</div>

<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }
  function toggleTheme() {
    const body = document.body;
    const btn  = document.getElementById('themeBtn');
    body.classList.toggle('light');
    const isLight = body.classList.contains('light');
    btn.textContent = isLight ? '☀️' : '🌙';
    localStorage.setItem('akleto-theme', isLight ? 'light' : 'dark');
  }
  (function initTheme() {
    if (localStorage.getItem('akleto-theme') === 'light') {
      document.body.classList.add('light');
      document.addEventListener('DOMContentLoaded', () => { document.getElementById('themeBtn').textContent = '☀️'; });
    }
  })();
</script>

</body>
</html>
