<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>أكليتو — السائقين</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="admin-style.css?v=6">
<script type="module">
import {
  db, auth, collection, getDocs, doc, updateDoc,
  onAuthStateChanged, signOut, withTimeout
} from "./firebase-init.js";

let driversCache = [];

function showToast(message, isError) {
  let toast = document.getElementById('akleto-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'akleto-toast';
    document.body.appendChild(toast);
  }
  toast.textContent = message;
  toast.className = 'akleto-toast show' + (isError ? ' error' : '');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => { toast.className = 'akleto-toast'; }, 2500);
}

window.addEventListener('DOMContentLoaded', () => {

  onAuthStateChanged(auth, user => {
    if (!user) {
      window.location.href = 'akleto-admin.html';
    } else {
      document.getElementById('app-shell').style.display = 'flex';
      loadDrivers();
    }
  });

  window.adminLogout = () => signOut(auth);

  async function loadDrivers() {
    const wrap = document.getElementById('driversWrap');
    wrap.innerHTML = `<div class="empty-state" style="padding:14px 0;">جاري التحميل...</div>`;
    try {
      const snap = await getDocs(collection(db, 'drivers'));
      driversCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch(e) {
      console.error('load drivers error', e);
      wrap.innerHTML = `<div class="empty-state" style="padding:14px 0;">صار خطأ بتحميل السائقين — تحقق من الإنترنت</div>`;
      return;
    }
    document.getElementById('drivers-count').textContent = driversCache.length;
    renderDrivers();
  }

  function renderDrivers() {
    const wrap = document.getElementById('driversWrap');
    if (!driversCache.length) {
      wrap.innerHTML = `<div class="empty-state" style="padding:30px 0;">
        ما في سائقين مسجّلين لسا 🛵<br/>
        <span style="font-size:12px;color:var(--cream30);">بيظهروا هون تلقائياً أول ما يسجّلوا من تطبيق السائق</span>
      </div>`;
      return;
    }
    // الأحدث تسجيلاً أولاً
    const sorted = [...driversCache].sort((a, b) =>
      (b.created_at?.toMillis?.() || 0) - (a.created_at?.toMillis?.() || 0));

    wrap.innerHTML = sorted.map(d => {
      const blocked = d.is_active === false;
      const joined = d.created_at && d.created_at.toDate ? d.created_at.toDate().toLocaleDateString('ar-JO') : '—';
      return `
        <div class="ingredient-list-item">
          <div class="ing-thumb">🛵</div>
          <div class="ing-info">
            <div class="ing-name">${d.name || 'بدون اسم'} ${blocked ? '<span style=\"color:#D9534F;font-size:11px;\">(محظور)</span>' : ''}</div>
            <div class="ing-meta">${d.phone || '—'} · ${d.deliveries_count || 0} توصيلة · انضم ${joined}</div>
          </div>
          <button type="button" class="ing-remove" style="font-size:12px;width:auto;padding:6px 10px;"
                  onclick="toggleBlockDriver('${d.id}', ${blocked})">${blocked ? 'رفع الحظر' : 'حظر'}</button>
        </div>`;
    }).join('');
  }

  window.toggleBlockDriver = async (id, currentlyBlocked) => {
    const d = driversCache.find(x => x.id === id);
    const action = currentlyBlocked ? 'رفع الحظر عن' : 'حظر';
    if (!confirm(`تأكيد ${action} "${d ? d.name : 'هذا السائق'}"؟`)) return;
    try {
      await withTimeout(updateDoc(doc(db, 'drivers', id), { is_active: currentlyBlocked }), 15000, 'انتهت مهلة الحفظ — تأكد من الإنترنت');
      d.is_active = currentlyBlocked;
      renderDrivers();
      showToast(currentlyBlocked ? 'تم رفع الحظر ✅' : 'تم حظر السائق ✅');
    } catch(e) {
      console.error('toggle block error', e);
      showToast('صار خطأ — جرب مرة ثانية ❌', true);
    }
  };

});
</script>
</head>
<body>

<div id="app-shell" style="display:none;width:100%;">

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-text">أكليتو 🍽️</div>
    <div class="logo-sub">لوحة التحكم — ADMIN</div>
  </div>

  <div class="nav-section">
    <div class="nav-label">الرئيسية</div>
    <a class="nav-item" href="akleto-admin.html" style="text-decoration:none;color:inherit;">
      <span class="nav-icon">📊</span><span>نظرة عامة</span>
    </a>
    <a class="nav-item" href="akleto-admin-orders.html" style="text-decoration:none;color:inherit;"><span class="nav-icon">🛒</span><span>الطلبات</span></a>
    <a class="nav-item" href="akleto-admin-meals.html" style="text-decoration:none;color:inherit;">
      <span class="nav-icon">🍖</span><span>الوجبات</span>
    </a>
    <a class="nav-item" href="akleto-admin-ingredients.html" style="text-decoration:none;color:inherit;">
      <span class="nav-icon">🧅</span><span>المكونات</span>
    </a>
  </div>

  <div class="nav-section">
    <div class="nav-label">المستخدمون</div>
    <a class="nav-item" href="akleto-admin-customers.html" style="text-decoration:none;color:inherit;">
      <span class="nav-icon">👤</span><span>الزبائن</span>
    </a>
    <a class="nav-item active" href="akleto-admin-drivers.html" style="text-decoration:none;color:inherit;">
      <span class="nav-icon">🛵</span><span>السائقين</span>
    </a>
    <a class="nav-item" href="akleto-admin-stores.html" style="text-decoration:none;color:inherit;"><span class="nav-icon">🏪</span><span>المتاجر الشريكة</span></a>
  </div>

  <div class="nav-section">
    <div class="nav-label">الإعدادات</div>
    <div class="nav-item"><span class="nav-icon">📣</span><span>الإشعارات</span></div>
    <div class="nav-item"><span class="nav-icon">⚙️</span><span>الإعدادات</span></div>
  </div>

  <div class="sidebar-footer">
    <div class="admin-card">
      <div class="admin-avatar">م</div>
      <div>
        <div class="admin-name">مؤيد</div>
        <div class="admin-role">مدير المنصة 👑</div>
      </div>
      <button onclick="adminLogout()" title="خروج" style="margin-right:auto;background:none;border:none;color:var(--cream30);cursor:pointer;font-size:16px;">⏻</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div>
      <div class="page-title">🛵 السائقين</div>
      <div class="page-subtitle"><span id="drivers-count">0</span> سائق مسجّل</div>
    </div>
    <div class="topbar-actions">
      <button class="menu-toggle" id="menuBtn" onclick="toggleSidebar()" title="القائمة">☰</button>
      <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="تبديل الوضع">🌙</button>
    </div>
  </div>

  <div class="card">
    <div id="driversWrap"></div>
  </div>
</main>

</div>

<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => { if (window.innerWidth <= 860) closeSidebar(); });
    });
  });
  function toggleTheme() {
    const body = document.body;
    const btn  = document.getElementById('themeBtn');
    body.classList.toggle('light');
    btn.textContent = body.classList.contains('light') ? '🌙' : '☀️';
    localStorage.setItem('akleto-theme', body.classList.contains('light') ? 'light' : 'dark');
  }
  if (localStorage.getItem('akleto-theme') === 'light') {
    document.body.classList.add('light');
    document.addEventListener('DOMContentLoaded', () => { document.getElementById('themeBtn').textContent = '🌙'; });
  }
</script>
</body>
</html>
